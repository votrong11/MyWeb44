<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phân tích URL</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    h1 { font-size: 20px; }
    p { font-family: monospace; background: #eee; padding: 8px; }
    ul { margin-top: 16px; }
    li { margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>Phân tích cấu trúc URL</h1>

  <p>https://example.com/products/list?page=2#top</p>

  <ul>
    <li><strong>Protocol:</strong> https:</li>
    <li><strong>Domain:</strong> example.com</li>
    <li><strong>Path:</strong> /products/list</li>
    <li><strong>Query:</strong> page=2</li>
    <li><strong>Fragment:</strong> top</li>
  </ul>
</body>
</html>
