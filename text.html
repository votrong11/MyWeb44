<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form nhập URL</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    h1 { font-size: 20px; margin-bottom: 16px; }
    form { display: flex; gap: 8px; }
    input { flex: 1; padding: 8px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 8px 16px; font-size: 14px; background: #2c2c2a; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Phân tích URL</h1>

  <form>
    <input type="text" placeholder="Nhập URL tại đây..." />
    <button type="button">Phân tích URL</button>
  </form>
</body>
</html>
